name: Deploy DocC to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: xcode-27
    steps:
      - uses: actions/checkout@v7
      - name: Build DocC
        run: |
          xcodebuild docbuild \
            -scheme MaritimeRouteKit \
            -derivedDataPath /tmp/docbuild \
            -destination 'generic/platform=iOS'

          $(xcrun --find docc) process-archive \
            transform-for-static-hosting \
            /tmp/docbuild/Build/Products/Debug-iphoneos/MaritimeRouteKit.doccarchive \
            --output-path docs \
            --hosting-base-path maritime-route-kit

          echo '<script>window.location.href += "/documentation/maritimeroutekit"</script>' > docs/index.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
